# Avoids repeating the same config across multiple services.
# All airflow services (scheduler, webserver, worker) share
# the same base config via YAML anchors (&) and aliases (<<: *)
x-airflow-common: &airflow-common
  image: airflow-dbt:latest
  env_file:
    - ../.env
  environment:
    # Tells Airflow where to store metadata (tasks, DAG runs, logs)
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    # Single-node setup:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__CORE__FERNET_KEY: ''
    # Default UI user (used in init)
    _AIRFLOW_WWW_USER_USERNAME: admin
    _AIRFLOW_WWW_USER_PASSWORD: admin
  volumes:
    # Mount folders into the container:
    - ./dags:/opt/airflow/dags
    - ./logs:/opt/airflow/logs
    - ./plugins:/opt/airflow/plugins
    - ./config:/opt/airflow/config
    # Mount dbt project to trigger dbt commands
    - ../dbt_transformation_layer:/opt/airflow/dbt
    # Mount Python scripts
    - ../api_extract_data:/opt/airflow/api_extract_data
  depends_on:
    postgres:
      condition: service_healthy

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD", "pg_isready", "-U", "airflow" ]
      interval: 10s
      retries: 5

  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command: -c "
      airflow db migrate &&
      airflow users create \
        --username $${_AIRFLOW_WWW_USER_USERNAME} \
        --password $${_AIRFLOW_WWW_USER_PASSWORD} \
        --firstname Admin \
        --lastname User \
        --role Admin \
        --email admin@example.com \
      || true
      "
      
  airflow-apiserver:
    <<: *airflow-common
    command: api-server
    ports:
      - "8080:8080"
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    healthcheck:
      test: [ "CMD", "curl", "--fail", "http://localhost:8080/api/v2/version" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully

volumes:
  postgres-data:
