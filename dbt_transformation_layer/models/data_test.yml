models:
  - name: CLEAN_GAMES
    columns:
      - name: ID
        data_tests:
          - unique
          - not_null
          - dbt_utils.accepted_range:
              min_value: 0
              inclusive: true

      - name: NAME
        data_tests:
          - not_null

      - name: AVERAGE_RATING
        data_tests:
          - dbt_utils.accepted_range:
                min_value: 0
                max_value: 100
                inclusive: true

      - name: NUM_OF_REVIEWS
        data_tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: 0
              inclusive: true

      - name: WISHLIST_COUNT
        data_tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: 0
              inclusive: true


