models:
  - name: CLEAN_GAMES
    columns:
      - name: ID
        data_tests:
          - unique
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                inclusive: true

      - name: NAME
        data_tests:
          - not_null

      - name: AVERAGE_RATING
        data_tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                max_value: 100
                inclusive: true

      - name: NUM_OF_REVIEWS
        data_tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                inclusive: true

      - name: WISHLIST_COUNT
        data_tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                inclusive: true


  - name: CLEAN_FRANCHISE
    columns:
      - name: ID
        data_tests:
          - unique
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                inclusive: true

      - name: NAME
        data_tests:
          - unique
          - not_null
      
      - name: DATE_CREATED_AT
        data_tests:
          - not_null


  - name: CLEAN_GAMEMODE
    columns:
      - name: ID
        data_tests:
          - unique
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                inclusive: true

      - name: NAME
        data_tests:
          - unique
          - not_null
      
      - name: DATE_CREATED_AT
        data_tests:
          - not_null


  - name: CLEAN_GAMETYPE
    columns:
      - name: ID
        data_tests:
          - unique
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                inclusive: true

      - name: TYPE
        data_tests:
          - unique
          - not_null
      
      - name: DATE_CREATED_AT
        data_tests:
          - not_null


  - name: CLEAN_GENRE
    columns:
      - name: ID
        data_tests:
          - unique
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                inclusive: true

      - name: NAME
        data_tests:
          - unique
          - not_null
      
      - name: DATE_CREATED_AT
        data_tests:
          - not_null


  - name: CLEAN_PLATFORM
    columns:
      - name: ID
        data_tests:
          - unique
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                inclusive: true

      - name: NAME
        data_tests:
          - unique
          - not_null
      
      - name: DATE_CREATED_AT
        data_tests:
          - not_null


  - name: CLEAN_POPTYPE
    columns:
      - name: ID
        data_tests:
          - unique
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                inclusive: true

      - name: NAME
        data_tests:
          - unique
          - not_null


  - name: CLEAN_POPPRIMITIVE
    columns:
      - name: ID
        data_tests:
          - unique
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                inclusive: true

      - name: FK_GAME
        data_tests:
          - unique
          - not_null
      
      - name: FK_POPULARITY_TYPE
        data_tests:
          - not_null

      - name: POPULARITY_SCORE
        data_tests:
          - not_null

      - name: DATE_MEASURED_AT
        data_tests:
          - not_null


  - name: CLEAN_GAMESTATUS
    columns:
      - name: ID
        data_tests:
          - unique
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                inclusive: true

      - name: STATUS
        data_tests:
          - unique
          - not_null
          - accepted_values:
              arguments:
                values: ['Alpha', 'Beta', 'Cancelled', 'Delisted', 'Early Access', 'Offline', 'Released', 'Rumored']


  - name: CLEAN_BRIDGE_FRANCHISE
    columns:
      - name: FK_GAME
        data_tests:
          - not_null

      - name: FK_FRANCHISE
        data_tests:
          - not_null


  - name: CLEAN_BRIDGE_GAMEMODE
    columns:
