        data_tests:
          - not_null

      - name: FK_GAME_MODE
        data_tests:
          - not_null


  - name: CLEAN_BRIDGE_GENRE
    columns:
      - name: FK_GAME
        data_tests:
          - not_null

      - name: FK_GENRE
        data_tests:
          - not_null


  - name: CLEAN_BRIDGE_PLATFORM
    columns:
      - name: FK_GAME
        data_tests:
          - not_null

      - name: FK_PLATFORM
        data_tests:
          - not_null